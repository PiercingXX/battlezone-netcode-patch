[Net]

; Ping ceiling before Net::AdjustBandwidth starts cutting the send rate.
; Stock 300 turns a jitter spike into a rate cut into more queueing into a
; bigger spike.  450 gives jittery links headroom before the governor bites.
MaxPing = 450

; Bytes added to the send budget per adjustment while under MaxPing.
UpCount = 100

; Bytes removed per adjustment while over MaxPing.
DownCount = 50

; Send-rate floor.  Stock 4000 (4 KB/s) lets one bad stretch collapse the
; rate to a trickle; 16000 keeps the game state flowing during recovery.
MinBandwidth = 16000

; Send-rate ceiling.  The common community "Auto-Kick Reduction Patch"
; caps this at 32000 (32 KB/s) which itself causes lag on modern links.
; 320000 effectively removes the cap.
MaxBandwidth = 320000

; Auto-kick relaxation, matching the community values.
AutoKickStart = 60000
AutoKickPing = 750
AutoKickLoss = 75
AutoKickTime = 45000

; Packet compression: keep enabled, less data per packet.
UseCompression = 1
